services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.preview.${SERVER_IP}.sslip.io
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n.preview.${SERVER_IP}.sslip.io/
      - N8N_SECURE_COOKIE=false
      - NODES_EXCLUDE=[]
      - N8N_PUBLIC_API_DISABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/deploy/preview-system:/home/node/preview-system
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.preview.${SERVER_IP}.sslip.io`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    networks:
      - proxy

volumes:
  n8n_data:

networks:
  proxy:
    external: true
